<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pal Optical - Professional Shop Forms</title>
  <meta name="description" content="Digitally fill, sign, and print forms for Pal Optical Shop in Lexington, KY." />
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- PWA Settings -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0284c7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Vite entry point with Tailwind CSS -->
  <link rel="stylesheet" href="/src/index.css" />
</head>

<body>
  <!-- Login Overlay -->
  <div id="login-overlay" style="display: flex; position: fixed; inset: 0; z-index: 9999;">
    <div class="login-backdrop"></div>
    <div class="login-card">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="4"/>
          <path d="M4.93 4.93l4.24 4.24"/>
          <path d="M14.83 14.83l4.24 4.24"/>
          <path d="M4.93 19.07l4.24-4.24"/>
          <path d="M14.83 9.17l4.24-4.24"/>
        </svg>
        <h1>Pal Optical</h1>
        <p>Professional Shop Forms</p>
      </div>
      <form id="login-form" onsubmit="return false;">
        <div class="login-field">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="login-username" placeholder="Username" autocomplete="username" autofocus>
        </div>
        <div class="login-field">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="login-btn">Sign In</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <div id="app" class="app-container" style="display: none;">
    <!-- Sidebar Navigation -->
    <aside id="sidebar-target" class="sidebar"></aside>

    <!-- Main Display Panel -->
    <main class="main-panel">
      <!-- Actions Toolbar -->
      <header id="form-actions-target" class="actions-header"></header>

      <!-- Form Rendering Area -->
      <section id="form-render-target" class="form-viewport"></section>
    </main>
  </div>

  <!-- PDF.js library for high-fidelity PDF rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <!-- Application Entry Point with Vite -->
  <script type="module" src="./src/app.ts"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
          .catch((err) => console.warn('Service Worker registration failed:', err));
      });
    }
  </script>
</body>

</html>
