<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pal Optical - Professional Shop Forms</title>
  <meta name="description" content="Digitally fill, sign, and print forms for Pal Optical Shop in Lexington, KY." />
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- PWA Settings -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0284c7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Vite entry point with Tailwind CSS -->
  <link rel="stylesheet" href="/src/index.css" />
</head>

<body>
  <div id="app" class="app-container">
    <!-- Sidebar Navigation -->
    <aside id="sidebar-target" class="sidebar"></aside>

    <!-- Main Display Panel -->
    <main class="main-panel">
      <!-- Actions Toolbar -->
      <header id="form-actions-target" class="actions-header"></header>

      <!-- Form Rendering Area -->
      <section id="form-render-target" class="form-viewport"></section>
    </main>
  </div>

  <!-- PDF.js library for high-fidelity PDF rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <!-- Application Entry Point with Vite -->
  <script type="module" src="/src/app.ts"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
          .catch((err) => console.warn('Service Worker registration failed:', err));
      });
    }
  </script>
</body>

</html>
